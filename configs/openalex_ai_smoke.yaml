project:
  benchmark: openalex_ai
  run_name: MetaGraphSci_openalex_ai_smoke
  output_dir: runs/openalex_ai_smoke
  cache_dir: cache/openalex_ai   # shared with full config so caches are reused
data:
  documents: data/openalex_ai/documents.parquet
  citations: data/openalex_ai/citations.parquet
  baselines: data/openalex_ai/baselines.parquet
  label_column: label
  source_col: source
  target_col: target
  split_strategy: time
  graph_mode: transductive
  label_ratio: 0.1
  test_size: 0.2
  val_size: 0.1
  max_context_size: 18
  sampling_strategy: local_relevance
  connectivity_weight: 0.35
  temporal_weight: 0.35
  reciprocity_weight: 0.15
  overlap_weight: 0.15
  k_hops: 2
  spectral_dim: 0
  enable_spectral: false
  max_seq_length: 512
  max_authors: null
  cache_text: true
  pretokenize_context: true
model:
  tokenizer_name: allenai/scibert_scivocab_uncased
  text_dim: 768
  metadata_dim: 256
  citation_dim: 256
  fusion_dim: 512
  classifier_scale: 10.0
  metadata_embedding_dim: 64
  metadata_cross_layers: 3
  peft_mode: lora
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  gradient_checkpointing: true
  freeze_backbone_until_layer: 6
  citation_heads: 4
  citation_layers: 2
  citation_ff_dim: 512
  selector_hidden_dim: 256
  selector_top_k: 8
  citation_dropout: 0.1
  fusion_modality_dropout: 0.1
  use_latent_graph: true
  latent_graph_top_k: 4
  hybrid_alpha_init: -2.0
train:
  # Smoke test: same batch_size as production so we exercise real memory pressure,
  # but only 1 seed × 1 ablation × 1+1 epochs to validate end-to-end in ~15-30 min.
  batch_size: 64
  num_workers: 8
  pretrain_epochs: 1
  finetune_epochs: 1
  seeds:
    - 42
  ablations:
    - full
trainer:
  mixed_precision: fp16
  gradient_accumulation_steps: 1
  pretrain_lr: 2.0e-05
  finetune_lr: 1.0e-05
  weight_decay: 0.01
  max_grad_norm: 1.0
  selection_metric: macro_f1
  lambda_ssl: 1.0
  contrastive_temperature: 0.07
  metadata_negative_weight: 0.25
  ssl_text_dropout: 0.15
  pseudo_label:
    beta: 0.9
    temperature: 1.0
    warmup_epochs: 1
    min_per_class: 1
    ema_momentum: 0.9
    distributionalignment: true
  use_mlflow: false   # avoid polluting the real experiment tracking server
  mlflow_experiment: MetaGraphSci_openalex_ai_smoke
  use_wandb: false
